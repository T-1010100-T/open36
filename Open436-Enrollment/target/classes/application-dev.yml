spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/open436
    username: open436
    password: ${DB_PASSWORD:open436}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    enabled: true
    table: enrollment_flyway_schema_history

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

logging:
  level:
    com.open436.enrollment: DEBUG
    org.springframework.web: DEBUG
