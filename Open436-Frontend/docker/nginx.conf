server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理 → Kong Gateway
    location /api/auth/       { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/enrollment/ { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/interview/  { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/files/      { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/users/      { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/posts/      { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/comments/   { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/sections/   { proxy_pass http://kong:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # HOJ 相关 API → HOJ Backend
    location /api/            { proxy_pass http://hoj-backend:6688; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
