server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker 内置 DNS，防止 nginx 缓存旧 IP
    resolver 127.0.0.11 valid=10s;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enrollment + Interview → Enrollment Service
    location /api/enrollment/ { proxy_pass http://enrollment:8084; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/interview/  { proxy_pass http://enrollment:8084; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # HOJ 相关 API → HOJ Backend（变量式 proxy_pass 动态解析 DNS）
    location /api/hoj/ {
        set $hoj_backend hoj-backend;
        rewrite ^/api/hoj/(.*)$ /api/$1 break;
        proxy_pass http://$hoj_backend:6688;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 其他 API → Auth Service
    location /api/            { proxy_pass http://auth:8081; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
