server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enrollment + Interview → Enrollment Service
    location /api/enrollment/ { proxy_pass http://enrollment:8084; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/interview/  { proxy_pass http://enrollment:8084; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # 其他 API → Auth Service
    location /api/            { proxy_pass http://auth:8081; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
