spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/open436
    username: open436
    password: ${DB_PASSWORD:open436}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    baseline-on-migrate: true
    baseline-version: 6
    enabled: true
    table: auth_flyway_schema_history

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms

hoj:
  sync:
    url: http://localhost:6688
    api-key: default-key-change-me

logging:
  level:
    com.open436.auth: DEBUG
    cn.dev33.satoken: DEBUG
